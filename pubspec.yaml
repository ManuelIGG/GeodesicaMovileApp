name: flutter_application_4_geodesica
description: Geodésica — Asistente financiero inteligente con reportes, gráficas y exportaciones.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.3.0
  animate_do: ^4.2.0
  flutter_animate: ^4.5.2
  simple_ripple_animation: ^0.1.0

  # ── Estado ────────────────────────────────────────────────────────
  provider: ^6.1.4

  # ── Firebase ──────────────────────────────────────────────────────
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  firebase_database: ^10.3.0
  cloud_firestore: ^4.17.0

  # ── HTTP ──────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Base de datos local ───────────────────────────────────────────
  sqflite: ^2.3.0
  mongo_dart: ^0.10.5

  # ── Archivos y rutas ──────────────────────────────────────────────
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Exportación PDF / Excel ───────────────────────────────────────
  pdf: ^3.10.8
  excel: ^4.0.3
  share_plus: ^9.0.0

  # ── Gráficas interactivas ─────────────────────────────────────────
  fl_chart: ^1.1.1

  # ── Fechas formateadas ────────────────────────────────────────────
  intl: ^0.19.0

  # ── Utilidades ────────────────────────────────────────────────────
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "imagenes/logoGeodesica.png"

flutter:
  uses-material-design: true
  assets:
    - imagenes/
    - assets/database/mis_datos.db
